kind = "web"
previewPath = "/"
title = "Pyram Sterling Bank"
version = "1.0.0"
id = "artifacts/bank-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24196

[services.development]
run = "pnpm --filter @workspace/bank-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bank-app", "run", "build" ]
publicDir = "artifacts/bank-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24196"
BASE_PATH = "/"
